<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Drinks Kings 👑</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="background"></div>

<!-- LOGIN / IDADE -->
<div class="gate" id="gate">
  <div class="card">
    <h1>Drinks Kings 👑</h1>
    <p>Você tem mais de 18 anos?</p>

    <div class="inputs">
      <input id="dia" placeholder="DD" maxlength="2">
      <input id="mes" placeholder="MM" maxlength="2">
      <input id="ano" placeholder="AAAA" maxlength="4">
    </div>

    <button onclick="entrar()">Entrar</button>

    <small>Se beber, não dirija.</small>
  </div>
</div>

<!-- CONTEÚDO -->
<div class="container hidden" id="container">

  <header class="section">
    <h1>Drinks Kings 👑</h1>
    <p>Catálogo premium de drinks</p>
  </header>

  <!-- FILTROS -->
  <div class="filters section">
    <button onclick="filter('all')">Todos</button>
    <button onclick="filter('vodka')">Vodka</button>
    <button onclick="filter('gin')">Gin</button>
    <button onclick="filter('whisky')">Whisky</button>
  </div>

  <!-- GRID -->
  <div class="grid section" id="grid"></div>

</div>

<script src="data.js"></script>
<script src="auth.js"></script>
<script src="app.js"></script>

</body>
</html>
